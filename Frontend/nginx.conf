server {
    listen      80;
    server_name  _;

    charset utf-8;

    location / {
        if ( $uri = '/index.html' ) {
          add_header Cache-Control no-store always;
        }
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html =404;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

}
